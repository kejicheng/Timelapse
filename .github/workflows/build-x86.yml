name: Build Timelapse x86 (Win32 Release)

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Detect installed Windows SDKs + toolsets
        shell: pwsh
        run: |
          Write-Host "=== Installed MSVC toolsets ==="
          Get-ChildItem 'C:\Program Files (x86)\Microsoft Visual Studio\*\*\VC\Tools\MSVC' -ErrorAction SilentlyContinue | Select-Object Name
          Write-Host "=== Installed Windows SDKs ==="
          Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\Include' -ErrorAction SilentlyContinue | Select-Object Name
          Write-Host "=== .NET Framework targeting packs ==="
          Get-ChildItem 'C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETFramework' -ErrorAction SilentlyContinue | Select-Object Name
          Write-Host "=== Is C++/CLI present? ==="
          if (Test-Path 'C:\Program Files (x86)\Microsoft Visual Studio\*\Enterprise\VC\Tools\MSVC\*\atlmfc\include\atlbase.h') { 'ATL ok' }
          $cli = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -prerelease -products * -requires Microsoft.VisualStudio.Component.VC.CLI.Support -property displayName -format value
          Write-Host "VC.CLI.Support: $cli"

      - name: Build v143 (Release, x86, override SDK to 10.0.22621.0)
        run: msbuild Timelapse.sln /p:Configuration=Release /p:Platform=x86 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0.26100.0 /m /v:minimal

      - name: Collect built DLL / pdb
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== Looking for outputs ==="
          Get-ChildItem -Recurse -Include *.dll,*.pdb,*.exp,*.lib -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'Release' }
          $out = "artifacts"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Get-ChildItem -Recurse -Include Timelapse.dll,Timelapse.pdb -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'Release' } |
            ForEach-Object { Copy-Item $_.FullName -Destination $out -Force }
          Write-Host "=== Collected ==="
          Get-ChildItem $out

      - name: Upload x86 build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Timelapse-x86-Release
          path: artifacts
          if-no-files-found: warn